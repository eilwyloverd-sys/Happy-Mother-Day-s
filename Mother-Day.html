<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day 💖</title>

<style>

/* ===== BACKGROUND ===== */

body{
margin:0;
font-family:'Poppins',sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#ffd6ec,#ffe6f7,#ffd1dc);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:#d63384;
margin-bottom:30px;
}

/* ===== MENU ===== */

.menu{
display:flex;
gap:20px;
}

.btn{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4f9a;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ===== OVERLAY ===== */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,240,250,0.96);
display:flex;
justify-content:center;
align-items:center;
transform:scale(0);
transition:0.4s;
}

.overlay.show{
transform:scale(1);
}

/* ===== CARD ===== */

.card{
width:90%;
max-width:700px;
max-height:80vh;     /* supaya bisa scroll */
overflow-y:auto;     /* SCROLL AKTIF */
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 25px 60px rgba(0,0,0,0.3);
text-align:center;
line-height:1.9;
color:#d63384;
}

/* ===== FOTO ===== */

.photo img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

/* ===== HEART ===== */

.heart{
position:fixed;
bottom:-20px;
animation:floatUp linear forwards;
font-size:20px;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);opacity:0;}
}

/* ===== BUTTON ===== */

.back{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#d63384;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Happy Mother's Day 💐</h1>

<div class="menu">
<button class="btn" onclick="openSurat()">💌 Buka Surat</button>
<button class="btn" onclick="openFoto()">📸 Foto Kenangan</button>
</div>

<audio id="music" loop>
<source src="Terima Kasih Ibu.mp3">
</audio>

<!-- ===== SURAT ===== -->
<div class="overlay" id="suratBox">
<div class="card">
<div id="text"></div>
<button class="back" onclick="closeAll()">Tutup</button>
</div>
</div>

<!-- ===== FOTO ===== -->
<div class="overlay" id="fotoBox">
<div class="card photo">

<img src="https://via.placeholder.com/500">
<img src="https://via.placeholder.com/500">
<img src="https://via.placeholder.com/500">

<button class="back" onclick="closeAll()">Tutup</button>
</div>
</div>

<script>

/* ===== HEART FLOAT ===== */
function heart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*4+4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
}
setInterval(heart,500);

/* ===== SURAT ===== */

const message=`Mama tersayang 💖

Selamat Hari Ibu…

Terima kasih untuk setiap pelukan hangat,
setiap doa yang tak pernah putus,
dan setiap cinta yang tak pernah habis.

Mama adalah rumah ternyaman dalam hidupku.
Tempat aku pulang,
tempat aku belajar,
tempat aku merasa dicintai tanpa syarat.

Aku berdoa semoga Tuhan selalu menjaga Mama,
memberikan kesehatan,
kebahagiaan,
dan damai sejahtera setiap hari.

✨ Firman Tuhan ✨
"Kasih itu sabar, kasih itu murah hati..."
— 1 Korintus 13:4

Aku sayang Mama selamanya 🤍`;

function openSurat(){
document.getElementById("suratBox").classList.add("show");

/* musik */
let music=document.getElementById("music");
music.volume=0;
music.play();
let fade=setInterval(()=>{
if(music.volume<1) music.volume+=0.05;
else clearInterval(fade);
},200);

/* typewriter */
let i=0;
let box=document.getElementById("text");
box.innerHTML="";
function typing(){
if(i<message.length){
box.innerHTML+=message.charAt(i)==="\n"?"<br>":message.charAt(i);
i++;
setTimeout(typing,30);
}
}
typing();
}

/* ===== FOTO ===== */

function openFoto(){
document.getElementById("fotoBox").classList.add("show");
}

/* ===== CLOSE ===== */

function closeAll(){
document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("show"));
}

</script>

</body>
</html>
